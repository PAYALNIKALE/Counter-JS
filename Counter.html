<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Click Counter</title>
    <link rel="stylesheet" href="counter.css">
</head>
<body>
    <div class="container">
        <h1>Click Counter</h1>
        <p>Click counter online. click '+' button or space to count:</p>

        <div class="counter-box">
            <input type="number" id="counter" value= 0  readonly disabled />
            <button id="reset" onclick="reset()">X</button>
        </div>

        <button class="btn plus" onclick="increment()">+</button>
        <button class="btn minus" onclick="decrement()">-</button>
    </div>

    <script src="counter.js"></script>
</body>
</html>
